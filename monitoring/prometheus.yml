global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # RabbitMQ 내장 Prometheus 플러그인 (포트 15692)
  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq:15692']

  # nginx: stub_status → nginx-prometheus-exporter(9113)
  - job_name: nginx
    static_configs:
      - targets: ['nginx-exporter:9113']

  # Spring: Actuator/Micrometer (/actuator/prometheus). instance 라벨로 spring1/spring2 구분
  - job_name: spring
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['spring1:8080', 'spring2:8080']
