services:
  postgres:
    image: postgres:16
    container_name: insurance-postgres
    environment:
      POSTGRES_USER: insurance
      POSTGRES_PASSWORD: insurance
      POSTGRES_DB: insurance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insurance"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: insurance-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # 관리 UI (http://localhost:15672, guest/guest)
      - "15692:15692"   # Prometheus 지표 엔드포인트
    volumes:
      - ./monitoring/rabbitmq/20-prometheus.conf:/etc/rabbitmq/conf.d/20-prometheus.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Python Worker: RabbitMQ 요청을 소비해 LangGraph agent 로 처리
  worker:
    build: ./app
    container_name: insurance-worker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://insurance:insurance@postgres:5432/insurance
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      # 컨테이너에서 호스트의 Ollama 로 접근 (Docker Desktop: host.docker.internal)
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app:/app
    command: python worker.py

  # Spring Boot WAS #1 (WebSocket 게이트웨이)
  spring1:
    build: ./spring
    container_name: insurance-spring1
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      INSTANCE_ID: spring1

  # Spring Boot WAS #2
  spring2:
    build: ./spring
    container_name: insurance-spring2
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      INSTANCE_ID: spring2

  # nginx 로드밸런서: spring1/spring2 로 분산 (WebSocket 프록시)
  nginx:
    image: nginx:1.27
    container_name: insurance-nginx
    depends_on:
      - spring1
      - spring2
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"   # http://localhost:8080

  # 외부 도메인 노출(ngrok). NGROK_AUTHTOKEN 설정 후:
  #   docker compose --profile tunnel up -d ngrok
  # 터널 URL 확인: http://localhost:4040
  ngrok:
    image: ngrok/ngrok:latest
    container_name: insurance-ngrok
    profiles: ["tunnel"]
    depends_on:
      - nginx
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    command: ["http", "nginx:80"]
    ports:
      - "4040:4040"   # ngrok 대시보드

  # nginx 지표 변환기: stub_status → Prometheus 포맷(9113)
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3.0
    container_name: insurance-nginx-exporter
    depends_on:
      - nginx
    command: ["--nginx.scrape-uri=http://nginx:8081/stub_status"]

  # 모니터링: Prometheus(지표 수집) + Grafana(대시보드)
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: insurance-prometheus
    depends_on:
      - rabbitmq
      - nginx-exporter
      - spring1
      - spring2
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"   # http://localhost:9090

  grafana:
    image: grafana/grafana:11.1.0
    container_name: insurance-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"   # http://localhost:3000 (admin/admin)

  # 대화형 CLI (디버깅용): docker compose run --rm app
  app:
    build: ./app
    container_name: insurance-agent
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://insurance:insurance@postgres:5432/insurance
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app:/app
    stdin_open: true
    tty: true

volumes:
  pgdata:
